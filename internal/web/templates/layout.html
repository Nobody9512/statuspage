{{ define "layout" }}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — {{ .Brand }}</title>
  {{ if .AutoRefresh }}<meta http-equiv="refresh" content="{{ .AutoRefresh }}">{{ end }}
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --border: #e6e4df;
      --ink: #1e1e1e;
      --muted: #6b6b6b;
      --muted-2: #9a9a9a;
      --ok: #78b531;
      --warn: #f5a524;
      --down: #e84c3d;
      --none: #e4e2dc;
      --link: #1a1a1a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: ui-serif, "Georgia", "Charter", serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 36px 28px 80px; }
    header.top {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 24px; font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
    }
    header.top h1 {
      font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em;
    }
    header.top .meta { font-size: 12px; color: var(--muted); }
    header.top .meta a { color: var(--link); }

    .banner {
      background: var(--ok);
      color: white;
      border-radius: 6px;
      padding: 20px 24px;
      font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 48px;
    }
    .banner.warn { background: var(--warn); }
    .banner.down { background: var(--down); }

    .section-label {
      font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
      font-size: 13px; color: var(--muted);
      text-align: right;
      margin-bottom: 10px;
    }
    .section-label a { color: var(--link); text-decoration: underline; }

    .services { display: flex; flex-direction: column; gap: 0; }
    .service {
      background: var(--panel);
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 18px 22px 14px;
      font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
    }
    .service:first-child { border-top-left-radius: 6px; border-top-right-radius: 6px; }
    .service:last-child { border-bottom: 1px solid var(--border); border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; }

    .service .head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 10px;
    }
    .service .name { font-size: 15px; font-weight: 500; color: var(--ink); }
    .service .name a { color: inherit; text-decoration: none; }
    .service .name a:hover { text-decoration: underline; }
    .service .status { font-size: 13px; font-weight: 500; }
    .service .status.ok { color: var(--ok); }
    .service .status.warn { color: var(--warn); }
    .service .status.down { color: var(--down); }
    .service .status.unknown { color: var(--muted-2); }

    .strip {
      display: flex;
      gap: 2px;
      height: 34px;
      align-items: stretch;
      position: relative;
    }
    .day {
      flex: 1 1 0;
      min-width: 3px;
      border-radius: 1.5px;
      position: relative;
      cursor: default;
    }
    .day.ok   { background: var(--ok); }
    .day.warn { background: var(--warn); }
    .day.down { background: var(--down); }
    .day.none { background: var(--none); }
    .day:hover { outline: 1px solid rgba(0,0,0,.25); outline-offset: 1px; z-index: 2; }

    .day .tt {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      padding: 14px 16px;
      min-width: 220px;
      font-size: 13px;
      text-align: left;
      z-index: 10;
      pointer-events: none;
    }
    .day:hover .tt { display: block; }
    .day .tt .d { font-weight: 600; margin-bottom: 6px; }
    .day .tt .r { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
    .day .tt .r-item { font-size: 13px; color: var(--ink); margin-top: 4px; }

    .service .footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
      font-size: 12px; color: var(--muted-2);
    }
    .service .footer .sep {
      flex: 1; height: 1px; background: var(--border); margin: 0 12px;
    }
    .service .footer .uptime { color: var(--muted); }

    h2.past {
      font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
      font-size: 28px; font-weight: 500;
      margin: 64px 0 24px;
      letter-spacing: -0.01em;
    }
    .day-block {
      border-bottom: 1px solid var(--border);
      padding: 18px 0 22px;
    }
    .day-block h3 {
      font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
      font-size: 18px; font-weight: 500; margin: 0 0 10px;
    }
    .day-block .empty {
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    .incident { margin-top: 14px; font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif; font-size: 14px; }
    .incident .title { color: var(--warn); font-weight: 600; font-size: 16px; margin-bottom: 6px; }
    .incident .title.down { color: var(--down); }
    .incident .line { margin: 4px 0; color: var(--ink); }
    .incident .line .tag { font-weight: 600; }
    .incident .line .tag.resolved { color: var(--ok); }
    .incident .line .tag.investigating { color: var(--warn); }
    .incident .time { font-size: 12px; color: var(--muted); }

    .back { font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif; font-size: 14px; color: var(--link); text-decoration: none; }
    .back:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .wrap { padding: 20px 14px 60px; }
      .strip { height: 28px; }
      .day .tt { min-width: 180px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>{{ .Brand }}</h1>
      <div class="meta">Last cycle: {{ .LastCycle }} · <a href="/">Dashboard</a></div>
    </header>
    {{ template "content" . }}
  </div>
</body>
</html>{{ end }}
